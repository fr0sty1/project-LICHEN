# LICHEN puck — field device Kconfig
# Full mesh stack: LoRa radio, IPv6, UDP, CoAP

# LoRa radio
CONFIG_LORA=y
CONFIG_LORA_SX12XX=y

# Networking (disable 802.15.4 L2 — we drive the radio directly)
CONFIG_NET_L2_CUSTOM_IEEE802154=n
CONFIG_NETWORKING=y
CONFIG_NET_IPV6=y
CONFIG_NET_UDP=y
CONFIG_NET_SOCKETS=y

# Application protocols
CONFIG_COAP=y

# RNG (needed for nonces, OSCORE)
CONFIG_ENTROPY_GENERATOR=y

# Stack sizes — LoRa + IPv6 + CoAP need generous stacks
CONFIG_MAIN_STACK_SIZE=4096
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048

# MbedTLS disabled — OSCORE crypto is provided by the LICHEN crypto layer
CONFIG_MBEDTLS=n

# Logging
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3
