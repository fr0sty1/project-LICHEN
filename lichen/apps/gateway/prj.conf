# LICHEN gateway — border router / SLIP bridge Kconfig
# Acts as DODAG root (RPL) and SLIP bridge to upstream host

# LoRa radio
CONFIG_LORA=y
CONFIG_LORA_SX12XX=y

# Networking
CONFIG_NETWORKING=y
CONFIG_NET_IPV6=y
CONFIG_NET_UDP=y
CONFIG_NET_SOCKETS=y

# Application protocols
CONFIG_COAP=y

# SLIP bridge
# CONFIG_SLIP_TAP / CONFIG_NET_SLIP_TAP are only valid for native_sim.
# For hardware builds (nucleo_wl55jc), remove the TAP options and enable
# CONFIG_UART_SLIP instead with the appropriate UART overlay.
CONFIG_SLIP=y
CONFIG_SLIP_TAP=y
CONFIG_NET_SLIP_TAP=y

# Larger stacks — gateway handles RPL root duties + forwarding
CONFIG_MAIN_STACK_SIZE=8192
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=4096

# Logging
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3
