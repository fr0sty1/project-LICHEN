# nRF52840 DK board config — BLE UART gateway
# The nRF52840 has no built-in LoRa radio; pair with an external SX1262 via SPI.

# BLE stack
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_DEVICE_NAME="LICHEN"
CONFIG_BT_MAX_CONN=1

# Enable extended ATT MTU so large IPv6 packets need fewer notify chunks
CONFIG_BT_GATT_CLIENT=n
CONFIG_BT_L2CAP_TX_MTU=247
CONFIG_BT_BUF_ACL_TX_SIZE=251
CONFIG_BT_BUF_ACL_RX_SIZE=251

# LICHEN BLE UART feature
CONFIG_LORA_LICHEN_BLE=y
