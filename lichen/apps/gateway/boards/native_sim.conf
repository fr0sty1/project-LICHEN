# native_sim board config — overrides / supplements prj.conf

# Simulator radio driver instead of real SX126x
CONFIG_LORA_LICHEN_SIM=y
CONFIG_LORA_LICHEN_SIM_HOST="127.0.0.1"
CONFIG_LORA_LICHEN_SIM_PORT=4444
CONFIG_LORA_LICHEN_SIM_NODE_ID="gw0"
CONFIG_LORA_LICHEN_SIM_SIM_ID="lichen"

# IPv4 needed by lora_sim driver to connect to the Python simulator over TCP;
# the mesh protocol itself is IPv6-only but the sim transport is 127.0.0.1.
CONFIG_NET_IPV4=y
CONFIG_NET_SOCKETS=y
