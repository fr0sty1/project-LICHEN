name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  python:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    defaults:
      run:
        working-directory: python
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        # Installed explicitly (rather than `pip install -e .`) to keep CI
        # independent of packaging-metadata quirks; mirrors the documented
        # local test setup.
        run: >
          pip install
          pytest pytest-asyncio pytest-timeout httpx ruff
          aiocoap anyio starlette uvicorn pynacl structlog cbor2

      - name: Lint (ruff)
        run: ruff check src tests

      - name: Tests
        # The full suite runs, including the integration tests (the BARRIER_SYNC
        # deadlock fgk and the half-duplex self-collision euj are both fixed).
        # The per-test timeout is a safety net so any new hang fails instead of
        # stalling the runner (thread method is async-safe).
        run: PYTHONPATH=src pytest -q --timeout=120 --timeout-method=thread

  rust:
    name: Rust
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust

      - name: Build
        run: cargo build --workspace --features lichen-link/schnorr,lichen-link/std
        working-directory: rust

      - name: Test
        run: cargo test --workspace --features lichen-link/schnorr,lichen-link/std
        working-directory: rust

      - name: Clippy
        run: cargo clippy --workspace --features lichen-link/schnorr,lichen-link/std -- -D warnings
        working-directory: rust

      - name: Format check
        run: cargo fmt --check
        working-directory: rust

  zephyr-native-sim:
    name: Zephyr native_sim
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        # Check out to workspace root so lichen/ (the manifest repo) sits
        # alongside zephyr/ — the standard west T2 workspace layout.

      - name: Install system deps
        run: sudo apt-get install -y --no-install-recommends cmake ninja-build gcc

      - name: Install west and Python deps
        run: pip install west

      - name: Cache Zephyr checkout
        id: cache-zephyr
        uses: actions/cache@v4
        with:
          path: zephyr
          key: zephyr-${{ hashFiles('lichen/west.yml') }}
          restore-keys: zephyr-

      - name: west init + update
        if: steps.cache-zephyr.outputs.cache-hit != 'true'
        run: |
          west init -l lichen/
          west update

      - name: west init (manifest only, Zephyr from cache)
        if: steps.cache-zephyr.outputs.cache-hit == 'true'
        run: west init -l lichen/

      - name: Install Zephyr Python requirements
        run: pip install -r zephyr/scripts/requirements.txt

      - name: west zephyr-export
        run: west zephyr-export

      - name: Build gateway (native_sim)
        run: west build -b native_sim lichen/apps/gateway -- -DZEPHYR_TOOLCHAIN_VARIANT=host
